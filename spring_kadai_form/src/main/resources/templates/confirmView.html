<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>確認画面</title>
</head>
<body>
    <h1>確認画面</h1>

    <table>
        <tr>
            <td>お名前：</td>
            <td><span th:text="${contactForm.name}"></span></td>
        </tr>
        <tr>
            <td>メールアドレス：</td>
            <td><span th:text="${contactForm.email}"></span></td>
        </tr>
        <tr>
            <td>お問い合わせ内容：</td>
            <td><span th:text="${contactForm.message}"></span></td>
        </tr>
    </table>

    <form th:action="@{/form}" method="get">
        <button type="submit">戻る</button>
    </form>
</body>
</html>
