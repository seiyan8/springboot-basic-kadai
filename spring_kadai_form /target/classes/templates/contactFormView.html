<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせフォーム</title>
</head>
<body>
    <h1>お問い合わせフォーム</h1>

    <form th:action="@{/confirm}" th:object="${contactForm}" method="post">
        <table>
            <tr>
                <td><label for="name">お名前：</label></td>
                <td>
                    <input type="text" th:field="*{name}" id="name" />
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red"></p>
                </td>
            </tr>
            <tr>
                <td><label for="email">メールアドレス：</label></td>
                <td>
                    <input type="text" th:field="*{email}" id="email" />
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></p>
                </td>
            </tr>
            <tr>
                <td><label for="message">お問い合わせ内容：</label></td>
                <td>
                    <textarea cols="30" rows="10" th:field="*{message}" id="message"></textarea>
                    <p th:if="${#fields.hasErrors('message')}" th:errors="*{message}" style="color:red"></p>
                </td>
            </tr>
        </table>

        <p><button type="submit">確認画面へ</button></p>
    </form>
</body>
</html>
